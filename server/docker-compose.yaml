services:
  server:
    build: .
    image: kretts/lunar-tear:latest
    environment:
      LUNAR_HOST: 127.0.0.1
      LUNAR_HTTP_PORT: 8080
    volumes:
      - ./assets:/opt/lunar-tear/assets
      - ./db:/opt/lunar-tear/db
    ports:
      - 443:443 # grpc, hardcoded by the client, not configurable
      - 8080:8080

